name: Publish CAVA test image

on:
  push:
    branches:
      - feature/azure-test-deployment
      - feature/oracle-always-free-prep
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish immutable SHA image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cava
      IMAGE_TAG: sha-${{ github.sha }}

    steps:
      - name: Check out the exact commit
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Refuse to overwrite an existing SHA tag
        shell: bash
        run: |
          if docker buildx imagetools inspect "${IMAGE_NAME}:${IMAGE_TAG}" >/dev/null 2>&1; then
            echo "Refusing to overwrite existing immutable tag ${IMAGE_TAG}." >&2
            exit 1
          fi

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/azure/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: true
